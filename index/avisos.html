<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFTT - Gestão de Avisos</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="css/avisos.css">
    <!-- OBS: PARA APAGAR as mensagem do chat, use localStorage.clear(); no Console do F12 -->
</head>
<body>

    <!-- === CABEÇALHO === -->
    <header class="main-header">
        <div class="header-left">
            <div class="logo-text">IFTT</div>
            <nav class="main-nav">
                <a href="inicio.html" class="nav-item">
                    <ion-icon name="home-outline"></ion-icon> <span>Início</span>
                </a>
                <a href="validaçãocert.html" class="item-navegacao active">
                    <ion-icon name="megaphone-outline"></ion-icon> <span>Validação de certificado</span>
                </a>
            </nav>
        </div>

        <div class="header-right">
            <!-- === TEMA DA PÁGINA === -->
            <div id="theme-toggle"
                style="cursor: pointer; font-size: 24px; margin-right: 15px; display: flex; align-items: center;">
                <ion-icon name="moon-outline" id="theme-icon"></ion-icon>
            </div>

            <a href="perfil.html" class="link-perfil">
                <div class="perfil-usuario">
                    <div class="info-usuario">
                        <span class="nome-usuario">Teste Usuário</span>
                        <span class="cargo-usuario">Diretor</span>
                    </div>
                    <div class="avatar">TU</div>
                    <ion-icon name="chevron-down-outline"
                        style="font-size: 12px; color: rgba(255,255,255,0.7)"></ion-icon>
                </div>
            </a>
        </div>
    </header>

    <div class="app-body">
        <!-- === SERVER RAIL === -->
        <nav class="server-rail">
            <a href="inicio.html" class="server-icon" title="Início">
                <ion-icon name="newspaper-outline"></ion-icon>
            </a>
            <div class="separator"></div>

            <a href="canais.html" class="server-icon" title="Comunicação Interna">
                <ion-icon name="people-outline"></ion-icon>
                <div class="notificacao-badge">4</div>
            </a>

            <a href="avisos.html" class="server-icon active" title="Avisos">
                <ion-icon name="megaphone-outline"></ion-icon>
            </a>
        </nav>

        <!-- === ÁREA DE CONTEÚDO === -->
        <main class="content-scroll-area">
            <div class="admin-container">

                <div class="page-title-area">
                    <h2 class="page-title">Gestão e Lançamento de Avisos</h2>
                </div>

                <div class="admin-grid">

                    <!-- === FORMULÁRIO DE CRIAÇÃO E EDIÇÃO === -->
                    <div class="admin-card">
                        <h3 id="formTitle"><ion-icon name="add-circle-outline"></ion-icon> Criar Novo Aviso</h3>

                        <form id="avisoForm">
                            <input type="hidden" id="avisoId">

                            <div class="form-group">
                                <label for="titulo">Título do Aviso</label>
                                <input type="text" id="titulo" class="form-control" placeholder="Ex: Reunião Geral"
                                    required>
                            </div>

                            <div class="form-group">
                                <label for="descricao">Descrição</label>
                                <textarea id="descricao" class="form-control"
                                    placeholder="Insira o texto detalhado do aviso aqui..." required></textarea>
                            </div>

                            <div class="form-group">
                                <label for="imagem">URL da Imagem </label>
                                <input type="url" id="imagem" class="form-control" placeholder="Ex. imagem.jpg">
                            </div>

                            <div class="form-group">
                                <label for="prioridade">Prioridade</label>
                                <select id="prioridade" class="form-control" required>
                                    <option value="baixa">Baixa</option>
                                    <option value="alta">Alta</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="dataPub">Data de Publicação</label>
                                <input type="date" id="dataPub" class="form-control" required>
                            </div>

                            <button type="submit" class="btn-submit" id="btnSubmit">
                                <ion-icon name="send-outline"></ion-icon> Publicar Aviso
                            </button>

                            <button type="button" class="btn-submit" id="btnCancel"
                                style="display:none; background-color: var(--texto-secundario); margin-top: 10px;">
                                Cancelar Edição
                            </button>
                        </form>
                    </div>
                    <!-- === NOTIFICAÇÕES === -->
                    <div id="notificacao"></div>

                    <!-- === LISTA DE AVISOS === -->
                    <div class="admin-card">
                        <h3><ion-icon name="list-outline"></ion-icon> Avisos Publicados</h3>
                        <ul class="notice-list" id="noticeList">
                        </ul>
                    </div>

                </div>
            </div>
        </main>
    </div>
<script src="js/avisos.js"></script>
   
</body>
</html>
