<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFTT - Gestão de Avisos</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        /* === ITENS BÁSICOS === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* === CONFIGURAÇÃO DE VARIÁVEIS (CORES) === */
        :root {
            /* === TEMA CLARO === */
            --bg-body: #f4f6f8;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;

            --texto-primario: #333333;
            --texto-secundario: #666666;
            --texto-destaque: #1a4da3;

            --border-color: #e0e0e0;

            --header-bg: #1a4da3;
            --header-text: #ffffff;

            --btn-bg: #1a4da3;
            --btn-text: #ffffff;
            --btn-danger: #e53935;
            --btn-edit: #fb8c00;

            --icon-bg: #f0f2f5;
            --icon-color: #5c5e64;
            --icon-hover-bg: #1a4da3;
            --icon-hover-text: #ffffff;

            --tag-bg: #e3f2fd;
            --tag-text: #1565c0;

            --shadow-card: rgba(0, 0, 0, 0.05);
        }

        /* === NOTIFICAÇÃO === */
        #notificacao {
            visibility: hidden;
            min-width: 280px;
            max-width: 420px;

            background-color: var(--bg-card);
            color: var(--texto-primario);

            border: 1px solid var(--border-color);
            border-left: 5px solid var(--header-bg);

            text-align: center;
            border-radius: 8px;
            padding: 16px 18px;

            position: fixed;
            z-index: 9999;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);

            opacity: 0;
            transition: all 0.3s ease;

            box-shadow: 0 6px 20px var(--shadow-card);
            font-size: 14px;
        }

        #notificacao.visivel {
            visibility: visible;
            opacity: 1;
        }

        .toast-actions {
            margin-top: 14px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .toast-btn {
            border: none;
            padding: 7px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: 0.2s;
        }

        /* confirmar */
        .toast-confirm {
            background-color: var(--btn-bg);
            color: var(--btn-text);
        }

        /* cancelar */
        .toast-cancel {
            background-color: var(--icon-bg);
            color: var(--texto-primario);
        }

        .toast-btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        /* === TEMA ESCURO === */
        body.dark-mode {
            /* === TEMA ESCURO === */
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --bg-sidebar: #181818;

            --texto-primario: #e0e0e0;
            --texto-secundario: #b0b0b0;
            --texto-destaque: #64b5f6;

            --border-color: #333333;

            --header-bg: #1a4da3;
            --header-text: #e0e0e0;

            --btn-bg: #1a4da3;
            --btn-text: #e0e0e0;

            --icon-bg: #2c2c2c;
            --icon-color: #e0e0e0;
            --icon-hover-bg: #1a4da3;
            --icon-hover-text: #ffffff;

            --tag-bg: #1a4da3;
            --tag-text: #90caf9;

            --shadow-card: rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--bg-body);
            color: var(--texto-primario);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* === HEADER PRINCIPAL === */
        .main-header {
            background-color: var(--header-bg);
            color: var(--header-text);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            z-index: 10;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-color);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-text {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .main-nav {
            display: flex;
            gap: 5px;
            margin-left: 20px;
        }

        .nav-item,
        .item-navegacao {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 4px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-item:hover,
        .item-navegacao:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-item.active {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .perfil-usuario {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 20px;
            transition: 0.2s;
        }

        .perfil-usuario:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .avatar {
            width: 32px;
            height: 32px;
            background-color: #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a4da3;
            font-weight: bold;
            font-size: 12px;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .info-usuario {
            text-align: right;
            line-height: 1.2;
        }

        .nome-usuario {
            font-size: 13px;
            font-weight: bold;
            display: block;
            color: white;
        }

        .cargo-usuario {
            font-size: 11px;
            opacity: 0.7;
            color: white;
        }

        .link-perfil {
            text-decoration: none;
            display: block;
        }

        /* === CONTEÚDO PRINCIPAL === */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* === SERVER RAIL === */
        .server-rail {
            width: 70px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            gap: 12px;
            flex-shrink: 0;
            z-index: 5;
        }

        .server-icon {
            width: 44px;
            height: 44px;
            background-color: var(--icon-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--icon-color);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            text-decoration: none;
        }

        .server-icon:hover {
            border-radius: 12px;
            background-color: var(--icon-hover-bg);
            color: var(--icon-hover-text);
        }

        .server-icon.active {
            border-radius: 12px;
            background-color: var(--header-bg);
            color: white;
        }

        .separator {
            width: 32px;
            height: 2px;
            background: var(--border-color);
            margin: 4px 0;
        }

        .notificacao-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #e44d26;
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-body);
            font-weight: bold;
        }

        /* === ROLAGEM DO CONTEÚDO === */
        .content-scroll-area {
            flex: 1;
            overflow-y: auto;
            background-color: var(--bg-body);
            padding: 30px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .page-title-area {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .page-title {
            color: var(--texto-destaque);
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* === ADMINISTRAÇÃO (FORMULÁRIO E LISTA) === */
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .admin-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 15px var(--shadow-card);
            border: 1px solid var(--border-color);
        }

        .admin-card h3 {
            color: var(--texto-destaque);
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }

        /* === ESTILOS DO FORMULÁRIO === */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--texto-secundario);
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-body);
            color: var(--texto-primario);
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--header-bg);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-submit.editing {
            background-color: var(--btn-edit);
            color: #fff;
        }

        /* === LISTA DE AVISOS === */
        .notice-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .notice-item {
            background-color: var(--bg-body);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .notice-item:hover {
            transform: translateX(5px);
            border-left: 3px solid var(--header-bg);
        }

        .notice-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .notice-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--texto-primario);
        }

        .notice-meta {
            font-size: 12px;
            color: var(--texto-secundario);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }

        .badge.baixa {
            background-color: #4caf50;
        }

        .badge.media {
            background-color: #ff9800;
        }

        .badge.alta {
            background-color: #f44336;
        }

        .notice-actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            color: white;
        }

        .btn-edit {
            background-color: var(--btn-edit);
        }

        .btn-delete {
            background-color: var(--btn-danger);
        }

        .btn-action:hover {
            opacity: 0.8;
        }

        .empty-message {
            text-align: center;
            color: var(--texto-secundario);
            font-size: 14px;
            padding: 20px;
            font-style: italic;
        }

        @media (max-width: 900px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }

            .server-rail {
                display: none;
            }

            .main-header {
                padding: 0 15px;
            }

            .nav-item span {
                display: none;
            }

            .notice-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .notice-actions {
                width: 100%;
                justify-content: flex-end;
                border-top: 1px solid var(--border-color);
                padding-top: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- === CABEÇALHO === -->
    <header class="main-header">
        <div class="header-left">
            <div class="logo-text">IFTT</div>
            <nav class="main-nav">
                <a href="inicio.html" class="nav-item">
                    <ion-icon name="home-outline"></ion-icon> <span>Início</span>
                </a>
                <a href="cursos.html" class="nav-item">
                    <ion-icon name="school-outline"></ion-icon> <span>Cursos</span>
                </a>
                <a href="validaçãocert.html" class="item-navegacao active">
                    <ion-icon name="megaphone-outline"></ion-icon> <span>Validação de certificado</span>
                </a>
            </nav>
        </div>

        <div class="header-right">
            <!-- === TEMA DA PÁGINA === -->
            <div id="theme-toggle"
                style="cursor: pointer; font-size: 24px; margin-right: 15px; display: flex; align-items: center;">
                <ion-icon name="moon-outline" id="theme-icon"></ion-icon>
            </div>

            <a href="perfil.html" class="link-perfil">
                <div class="perfil-usuario">
                    <div class="info-usuario">
                        <span class="nome-usuario">Teste Usuário</span>
                        <span class="cargo-usuario">Diretor</span>
                    </div>
                    <div class="avatar">TU</div>
                    <ion-icon name="chevron-down-outline"
                        style="font-size: 12px; color: rgba(255,255,255,0.7)"></ion-icon>
                </div>
            </a>
        </div>
    </header>

    <div class="app-body">
        <!-- === SERVER RAIL === -->
        <nav class="server-rail">
            <a href="inicio.html" class="server-icon" title="Início">
                <ion-icon name="newspaper-outline"></ion-icon>
            </a>
            <div class="separator"></div>

            <a href="canais.html" class="server-icon" title="Comunicação Interna">
                <ion-icon name="people-outline"></ion-icon>
                <div class="notificacao-badge">4</div>
            </a>

            <a href="calendario.html" class="server-icon" title="Calendário de Eventos">
                <ion-icon name="calendar-outline"></ion-icon>
            </a>

            <a href="avisos.html" class="server-icon active" title="Avisos">
                <ion-icon name="megaphone-outline"></ion-icon>
            </a>
        </nav>

        <!-- === ÁREA DE CONTEÚDO === -->
        <main class="content-scroll-area">
            <div class="admin-container">

                <div class="page-title-area">
                    <h2 class="page-title">Gestão e Lançamento de Avisos</h2>
                </div>

                <div class="admin-grid">

                    <!-- === FORMULÁRIO DE CRIAÇÃO E EDIÇÃO === -->
                    <div class="admin-card">
                        <h3 id="formTitle"><ion-icon name="add-circle-outline"></ion-icon> Criar Novo Aviso</h3>

                        <form id="avisoForm">
                            <input type="hidden" id="avisoId">

                            <div class="form-group">
                                <label for="titulo">Título do Aviso</label>
                                <input type="text" id="titulo" class="form-control" placeholder="Ex: Reunião Geral"
                                    required>
                            </div>

                            <div class="form-group">
                                <label for="descricao">Descrição</label>
                                <textarea id="descricao" class="form-control"
                                    placeholder="Insira o texto detalhado do aviso aqui..." required></textarea>
                            </div>

                            <div class="form-group">
                                <label for="imagem">URL da Imagem </label>
                                <input type="url" id="imagem" class="form-control" placeholder="Ex. imagem.jpg">
                            </div>

                            <div class="form-group">
                                <label for="prioridade">Prioridade</label>
                                <select id="prioridade" class="form-control" required>
                                    <option value="baixa">Baixa</option>
                                    <option value="media">Media</option>
                                    <option value="alta">Alta</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="dataPub">Data de Publicação</label>
                                <input type="date" id="dataPub" class="form-control" required>
                            </div>

                            <button type="submit" class="btn-submit" id="btnSubmit">
                                <ion-icon name="send-outline"></ion-icon> Publicar Aviso
                            </button>

                            <button type="button" class="btn-submit" id="btnCancel"
                                style="display:none; background-color: var(--texto-secundario); margin-top: 10px;">
                                Cancelar Edição
                            </button>
                        </form>
                    </div>
                    <!-- === NOTIFICAÇÕES === -->
                    <div id="notificacao"></div>

                    <!-- === LISTA DE AVISOS === -->
                    <div class="admin-card">
                        <h3><ion-icon name="list-outline"></ion-icon> Avisos Publicados</h3>
                        <ul class="notice-list" id="noticeList">
                            <!-- OS ITENS SERÃO GERADOS PELO JavaScript -->
                        </ul>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script>
        // === NOTIFICAÇÃO ===
        function showToast(message, type = "sucesso", duration = 3000) {

            const toast = document.getElementById("notificacao");

            toast.className = "";
            toast.innerHTML = `<div>${message}</div>`;

            toast.classList.add("visivel", type);

            setTimeout(() => {
                toast.classList.remove("visivel");
            }, duration);
        }

        function showConfirmToast(message, onConfirm) {

            const toast = document.getElementById("notificacao");

            toast.innerHTML = `
    <div>${message}</div>
    <div class="toast-actions">
        <button class="toast-btn toast-confirm">Confirmar</button>
        <button class="toast-btn toast-cancel">Cancelar</button>
    </div>
`;

            toast.className = "visivel";

            toast.querySelector(".toast-confirm").onclick = () => {
                toast.classList.remove("visivel");
                onConfirm();
                showToast("Aviso excluído com sucesso!");
            };

            toast.querySelector(".toast-cancel").onclick = () => {
                toast.classList.remove("visivel");
                showToast("Exclusão cancelada.");
            };
        }
        // === TEMA ESCURO ===
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark-mode');
            themeIcon.setAttribute('name', 'sunny-outline');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeIcon.setAttribute('name', isDark ? 'sunny-outline' : 'moon-outline');
        });

        // === GESTÃO DE AVISOS ===
        const form = document.getElementById('avisoForm');
        const noticeList = document.getElementById('noticeList');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnCancel = document.getElementById('btnCancel');
        const formTitle = document.getElementById('formTitle');

        // === DADOS SIMULADOS ===
        let avisos = [
            {
                id: 1,
                titulo: "Juros punitivos e baixa demanda seguraram crescimento da indústria em 2025",
                descricao: "Análise detalhada sobre o impacto econômico no setor industrial de Sergipe e as expectativas para o próximo semestre, com dados exclusivos da CNI.",
                imagem: "",
                prioridade: "alta",
                data: "06/02/2026"
            },

            {
                id: 2,
                titulo: "Programador Full-Stack Duração: 670h Presencial",
                descricao: "As inscrições para o curso estão abertas.",
                imagem: "",
                prioridade: "media",
                data: "05/02/2026"
            },

            {
                id: 3,
                titulo: "Programador Front-End Duração: 348h Presencial",
                descricao: "As inscrições para o curso estão abertas.",
                imagem: "",
                prioridade: "media",
                data: "15/02/2026"
            },

            {
                id: 4,
                titulo: "Introdução a IoT para Manutenção Industrial Duração: 40h Presencial",
                descricao: "As inscrições para o curso estão abertas.",
                imagem: "",
                prioridade: "media",
                data: "21/02/2026"
            },

            {
                id: 5,
                titulo: "Inspetor de Qualidade Duração: 160h Presencial",
                descricao: "As inscrições para o curso estão abertas.",
                imagem: "",
                prioridade: "media",
                data: "01/03/2026"
            },
        ];

        // === RENDERIZAR A LISTA ===
        function renderizarAvisos() {
            noticeList.innerHTML = '';

            if (avisos.length === 0) {
                noticeList.innerHTML = '<li class="empty-message">Nenhum aviso publicado no momento.</li>';
                return;
            }

            avisos.forEach(aviso => {
                const li = document.createElement('li');
                li.className = 'notice-item';
                li.innerHTML = `
                    <div class="notice-info">
                        <span class="notice-title">${aviso.titulo}</span>
                        <div class="notice-meta">
                            <span class="badge ${aviso.prioridade}">${aviso.prioridade}</span>
                           <span><ion-icon name="calendar-outline"></ion-icon> ${aviso.data}</span>
                        </div>
                    </div>
                    <div class="notice-actions">
                        <button class="btn-action btn-edit" onclick="editarAviso(${aviso.id})">
                            <ion-icon name="create-outline"></ion-icon> Editar
                        </button>
                        <button class="btn-action btn-delete" onclick="excluirAviso(${aviso.id})">
                            <ion-icon name="trash-outline"></ion-icon> Excluir
                        </button>
                    </div>
                `;
                noticeList.appendChild(li);
            });
        }

        // === ADICIONAR OU ATUALIZAR AVISO ===
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const idAtual = document.getElementById('avisoId').value;
            const novoAviso = {
                id: idAtual ? parseInt(idAtual) : Date.now(),
                titulo: document.getElementById('titulo').value,
                descricao: document.getElementById('descricao').value,
                imagem: document.getElementById('imagem').value,
                prioridade: document.getElementById('prioridade').value,
                data: document.getElementById('dataPub').value
            };

            if (idAtual) {
                // === ATUALIZAR EXISTENTE ===
                avisos = avisos.map(aviso => aviso.id === novoAviso.id ? novoAviso : aviso);
                resetarFormulario();
            } else {
                // === CRIAR NOVO ===
                avisos.unshift(novoAviso);
            }

            form.reset();
            renderizarAvisos();
        });

        // === EXCLUIR AVISO ===
        window.excluirAviso = function (id) {

            showConfirmToast(
                "Deseja realmente excluir este aviso?",
                () => {
                    avisos = avisos.filter(aviso => aviso.id !== id);
                    renderizarAvisos();
                }
            );

        }
        // === EDITAR AVISO ===
        window.editarAviso = function (id) {
            const aviso = avisos.find(a => a.id === id);
            if (!aviso) return;

            document.getElementById('avisoId').value = aviso.id;
            document.getElementById('titulo').value = aviso.titulo;
            document.getElementById('descricao').value = aviso.descricao;
            document.getElementById('imagem').value = aviso.imagem;
            document.getElementById('prioridade').value = aviso.prioridade;
            document.getElementById('dataPub').value = aviso.data;

            // === ALTERAR FORMULÁRIO ===
            formTitle.innerHTML = '<ion-icon name="create-outline"></ion-icon> Editar Aviso';
            btnSubmit.innerHTML = '<ion-icon name="save-outline"></ion-icon> Atualizar Aviso';
            btnSubmit.classList.add('editing');
            btnCancel.style.display = 'block';

            // === FOCAR NO TÍTULO ===
            document.getElementById('titulo').focus();
        }

        // === CANCELAR EDIÇÃO ===
        btnCancel.addEventListener('click', resetarFormulario);

        function resetarFormulario() {
            form.reset();
            document.getElementById('avisoId').value = '';
            formTitle.innerHTML = '<ion-icon name="add-circle-outline"></ion-icon> Criar Novo Aviso';
            btnSubmit.innerHTML = '<ion-icon name="send-outline"></ion-icon> Publicar Aviso';
            btnSubmit.classList.remove('editing');
            btnCancel.style.display = 'none';
        }

        // === INICIALIZAÇÃO ===
        document.addEventListener('DOMContentLoaded', () => {

            // === DEFINE A DATA DE HOJE COMO PADRÃO NO INPUT ===
            document.getElementById('dataPub').valueAsDate = new Date();
            renderizarAvisos();
        });

    </script>
</body>

</html>
