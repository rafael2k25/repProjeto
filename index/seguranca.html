<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFTT - Canais de Comunicação</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Segoe+UI:wght@400;600&display=swap">
    <link rel="stylesheet" href="css/seguranca.css">
</head>
<body>

    <!-- === CABEÇALHO === -->
    <header class="cabecalho-principal">
        <div class="cabecalho-esquerda">
            <div class="logo-texto">IFTT</div>
            <nav class="navegacao-principal">
                <a href="inicio.html" class="item-navegacao">
                    <ion-icon name="home-outline"></ion-icon> <span>Início</span>
                </a>
                <a href="cursos.html" class="item-navegacao">
                    <ion-icon name="school-outline"></ion-icon> <span>Cursos</span>
                </a>
                <a href="validaçãocert.html" class="item-navegacao">
                    <ion-icon name="megaphone-outline"></ion-icon> <span>Validação de Certificado</span>
                </a>
            </nav>
        </div>

        <div class="cabecalho-direita">
            <div id="theme-toggle"
                style="cursor: pointer; font-size: 24px; margin-right: 15px; display: flex; align-items: center;">
                <ion-icon name="moon-outline" id="theme-icon"></ion-icon>
            </div>

            <a href="perfil.html" class="link-perfil">
                <div class="perfil-usuario">
                    <div class="info-usuario">
                        <span class="nome-usuario">Teste Usuário</span>
                        <span class="cargo-usuario">Diretor</span>
                    </div>
                    <div class="avatar">TU</div>
                    <ion-icon name="chevron-down-outline" style="font-size: 12px; color: rgba(255,255,255,0.7)">
                    </ion-icon>
                </div>
            </a>
        </div>
    </header>

    <div class="corpo-aplicacao">

        <nav class="barra-lateral-icones">
            <a href="inicio.html" class="icone-lateral" title="Início">
                <ion-icon name="newspaper-outline"></ion-icon>
            </a>
            <div class="separador"></div>

            <a href="canais.html" class="icone-lateral ativo" title="Comunicação Interna">
                <ion-icon name="people-outline"></ion-icon>
                <div class="notificacao-badge">4</div>
            </a>

            <a href="calendario.html" class="icone-lateral" title="Calendário de Eventos">
                <ion-icon name="calendar-outline"></ion-icon>
            </a>

            <a href="avisos.html" class="icone-lateral" title="Avisos">
                <ion-icon name="megaphone-outline"></ion-icon>             
            </a>
        </nav>

        <main class="layout-chat">

            <aside class="painel-lista-conversas">
                <div class="cabecalho-lista">
                    <h2 class="titulo-painel">Mensagens</h2>
                    <input type="text" class="input-busca-chat" placeholder="Buscar conversas...">
                </div>
                <div class="lista-canais">
                    <a href="canais.html" class="item-canal ativo">
                        <div class="avatar-canal" style="background: var(--header-bg);">G</div>
                        <div class="info-canal">
                            <span class="nome-canal">Canal Geral</span>
                            <span class="preview-msg">Bom dia a todos! Lemb...</span>
                        </div>
                        <div class="status-online"></div>
                    </a>

                    <a href="manutencao.html" class="item-canal">
                        <div class="avatar-canal" style="background: var(--header-bg);">M</div>
                        <div class="info-canal">
                            <span class="nome-canal">Manutenção</span>
                            <span class="preview-msg">Boa tarde, o problema...</span>
                        </div>
                        <div class="status-online"></div>
                    </a>

                    <a href="seguranca.html" class="item-canal">
                        <div class="avatar-canal" style="background: var(--header-bg);">S</div>
                        <div class="info-canal">
                            <span class="nome-canal">Segurança</span>
                            <span class="preview-msg"> </span>
                        </div>
                    </a>

                    <a href="professores.html" class="item-canal">
                        <div class="avatar-canal" style="background: var(--header-bg);">PR</div>
                        <div class="info-canal">
                            <span class="nome-canal">Professores</span>
                            <span class="preview-msg">Bom dia pessoal, o si... </span>
                        </div>
                        <div class="status-online"></div>
                    </a>
                </div>
            </aside>

            <section class="area-chat-principal">
                <header class="cabecalho-chat">
                    <div class="info-chat-ativo">
                        <div class="avatar-canal"
                            style="background: var(--header-bg); width: 32px; height: 32px; font-size: 12px;">G</div>
                        <div>
                            <div class="titulo-chat-ativo">Segurança</div>
                            <div class="subtitulo-chat"><ion-icon name="ellipse"></ion-icon> 12 membros online</div>
                        </div>
                    </div>
                    <div class="botoes-chat"> <!-- === PARA USO FUTURO === -->

                    </div>
                </header>

                <div class="container-mensagens" id="containerMensagens">
                    <div class="mensagem">
                        <div class="avatar-msg">GH</div>
                        <div class="conteudo-msg">
                            <div class="cabecalho-msg">
                                <span class="nome-usuario-msg">Gabriel Hiarley</span>
                                <span class="horario-msg">09:45</span>
                            </div>
                            <p class="texto-msg">Bom dia </p>
                        </div>
                    </div>

                </div>

                <div class="area-input">
                    <input type="text" class="campo-texto-chat" id="inputMensagem" placeholder="Digite sua mensagem...">
                    <button class="botao-enviar" onclick="enviarMensagem()"><ion-icon name="send"></ion-icon></button>
                </div>
            </section>

        </main>
    </div>

    <script>
        const inputMensagem = document.getElementById('inputMensagem');
        const containerMensagens = document.getElementById('containerMensagens');

        // === CARREGAR AS MENSAGENS ===
        document.addEventListener('DOMContentLoaded', carregarMensagens);

        function enviarMensagem() {
            const texto = inputMensagem.value.trim();
            if (texto === "") return;

            const msgObj = {
                usuario: "Teste Usuário",
                conteudo: texto,
                horario: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                tipo: 'minha'
            };

            adicionarMensagemDOM(msgObj);
            salvarMensagem(msgObj);
            inputMensagem.value = "";
        }

        function adicionarMensagemDOM(msg) {
            const div = document.createElement('div');
            div.className = `mensagem ${msg.tipo === 'minha' ? 'minha' : ''}`;
            const iniciais = msg.tipo === 'minha' ? 'TU' : msg.usuario.substring(0, 2).toUpperCase();

            div.innerHTML = `
                <div class="avatar-msg">${iniciais}</div>
                <div class="conteudo-msg">
                    <div class="cabecalho-msg">
                        <span class="nome-usuario-msg">${msg.usuario}</span>
                        <span class="horario-msg">${msg.horario}</span>
                    </div>
                    <p class="texto-msg">${msg.conteudo}</p>
                </div>
            `;

            containerMensagens.appendChild(div);
            containerMensagens.scrollTop = containerMensagens.scrollHeight;
        }

        function salvarMensagem(msg) {
            let historico = JSON.parse(localStorage.getItem('chat_historico_pt')) || [];
            historico.push(msg);
            localStorage.setItem('chat_historico_pt', JSON.stringify(historico));
        }

        function carregarMensagens() {
            let historico = JSON.parse(localStorage.getItem('chat_historico_pt')) || [];
            historico.forEach(msg => adicionarMensagemDOM(msg));
        }

        inputMensagem.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarMensagem();
        });

        // === TEMA ESCURO ===
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark-mode');
            themeIcon.setAttribute('name', 'sunny-outline');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeIcon.setAttribute('name', isDark ? 'sunny-outline' : 'moon-outline');
        });
        // === FIM TEMA ESCURO ===

        /*

        ========= BASE DA API =========
        const CANAL_ID = 3;
        const API_BASE = "http://LINK";
        ========= BASE DA API =========

        ========= GET - CARREGAR E BUSCAR MENSAGENS =========
            async function carregarMensagens() {
                try {
                    const response = await fetch(`${API_BASE}/canais/${CANAL_ID}/mensagens`);
                    const mensagens = await response.json();

                    containerMensagens.innerHTML = "";

                    mensagens.forEach(msg => adicionarMensagemDOM(msg));

                } catch (error) {
                    console.error("Erro ao carregar mensagens:", error);
                }
            }

        async function buscarMensagemPorId(id) {
            try {
                const response = await fetch(`${API_BASE}/mensagens/${id}`);
                const mensagem = await response.json();

            } catch (error) {
                console.error("Erro ao buscar mensagem:", error);
            }
        ========= GET - CARREGAR E BUSCAR MENSAGENS =========

        ========= POST =========

                    try {
                        const response = await fetch(`${API_BASE}/mensagens`, {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },

                                ...msg,
                                canalId: CANAL_ID
                            })
                        });

                        const novaMensagem = await response.json();
                        console.log("Mensagem salva:", novaMensagem);

                    } catch (error) {
                        console.error("Erro ao salvar mensagem:", error);
                    }
                }
        ========= POST =========

        ========= PUT =========

                                "Content-Type": "application/json"
                            },

                        });

                            },

                        });

                        console.log("Mensagem atualizada parcialmente:", data);

                    } catch (error) {
                        console.error("Erro no PATCH:", error);
                    }
                }
        ========= PATCH =========

        ========= DELETE =========
                async function deletarMensagem(id) {
                    try {
                        await fetch(`${API_BASE}/mensagens/${id}`, {
                            method: "DELETE"
                        });

                    } catch (error) {
                        console.error("Erro ao deletar:", error);
                    }
                }
        ========= DELETE =========

        */

    </script>

</body>

</html>
